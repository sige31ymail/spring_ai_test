services:

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - ollama
    environment:
      SPRING_AI_OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
