<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Spring AI RAG Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f7f7f7;
        }

        h1 {
            font-size: 24px;
        }

        .chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            min-height: 300px;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user {
            background: #e8f0ff;
        }

        .assistant {
            background: #f0f0f0;
        }

        .sources {
            margin-top: 12px;
            font-size: 13px;
            color: #555;
        }

        .source-item {
            border-left: 4px solid #ccc;
            padding-left: 8px;
            margin-top: 8px;
        }

        textarea {
            width: 100%;
            height: 80px;
            font-size: 16px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            margin-top: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        select, input {
            padding: 6px;
            margin-right: 8px;
        }

        .controls {
            margin-bottom: 12px;
        }

        .loading {
            color: #777;
        }
    </style>
</head>
<body>
    <h1>Spring AI RAG Chat</h1>

    <div class="controls">
        <label>
            検索対象:
            <select id="mode">
                <option value="dir">docs全体</option>
                <option value="file">ファイル指定</option>
            </select>
        </label>

        <label>
            fileName:
            <select id="fileName">
                <option value="spring-ai-tools.md">spring-ai-tools.md</option>
                <option value="spring-ai-rag.md">spring-ai-rag.md</option>
                <option value="spring-ai-notes.md">spring-ai-notes.md</option>
            </select>
        </label>

        <label>
            topK:
            <input id="topK" type="number" value="10" min="1" max="20">
        </label>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <textarea id="message" placeholder="質問を入力してください">ToolContextとは何ですか？</textarea>
    <br>
    <button onclick="sendMessage()">送信</button>

    <script>
        async function sendMessage() {
            const chatBox = document.getElementById("chatBox");
            const messageInput = document.getElementById("message");
            const mode = document.getElementById("mode").value;
            const fileName = document.getElementById("fileName").value;
            const topK = document.getElementById("topK").value;

            const message = messageInput.value.trim();

            if (!message) {
                alert("質問を入力してください。");
                return;
            }

            appendMessage("user", message);

            const loadingElement = appendMessage("assistant loading", "回答生成中...");

            try {
                let url;

                if (mode === "file") {
                    url = `/ai/rag/ask-md-file?fileName=${encodeURIComponent(fileName)}&message=${encodeURIComponent(message)}&topK=${encodeURIComponent(topK)}&threshold=0.0`;
                } else {
                    url = `/ai/rag/ask-md-dir?message=${encodeURIComponent(message)}&topK=${encodeURIComponent(topK)}&threshold=0.0`;
                }

                const response = await fetch(url);

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const data = await response.json();

                loadingElement.remove();

                appendAnswer(data);

            } catch (error) {
                loadingElement.textContent = "エラーが発生しました: " + error.message;
            }
        }

        function appendMessage(type, text) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message " + type;
            div.textContent = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            return div;
        }

        function appendAnswer(data) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message assistant";

            const answer = document.createElement("div");
            answer.textContent = data.answer;
            div.appendChild(answer);

            if (data.sources && data.sources.length > 0) {
                const sources = document.createElement("div");
                sources.className = "sources";

                const title = document.createElement("strong");
                title.textContent = "参照元";
                sources.appendChild(title);

                data.sources.forEach(source => {
                    const item = document.createElement("div");
                    item.className = "source-item";

                    item.textContent =
                        `fileName: ${source.fileName || ""}\n` +
                        `title: ${source.title || ""}\n` +
                        `score: ${source.score}\n` +
                        `distance: ${source.distance}`;

                    sources.appendChild(item);
                });

                div.appendChild(sources);
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
