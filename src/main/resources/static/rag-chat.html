<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Spring AI RAG Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f7f7f7;
        }

        h1 {
            font-size: 24px;
        }

        .chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            min-height: 300px;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user {
            background: #e8f0ff;
        }

        .assistant {
            background: #f0f0f0;
        }

        .sources {
            margin-top: 12px;
            font-size: 13px;
            color: #555;
        }

        .source-item {
            border-left: 4px solid #ccc;
            padding-left: 8px;
            margin-top: 8px;
        }

        textarea {
            width: 100%;
            height: 80px;
            font-size: 16px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            margin-top: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        select,
        input {
            padding: 6px;
            margin-right: 8px;
        }

        .controls {
            margin-bottom: 12px;
        }

        .loading {
            color: #777;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        pre {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 6px;
        }

        .store-panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .store-panel button {
            margin-left: 8px;
            margin-top: 0;
            padding: 6px 12px;
            font-size: 14px;
        }

        .store-status {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            white-space: pre-wrap;
        }

        .answer-meta {
            margin-top: 8px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>
    <h1>Spring AI RAG Chat</h1>

    <div class="store-panel">
        <strong>VectorStore操作</strong>
        <button type="button" onclick="loadStore()">保存済みVectorStoreを読み込む</button>
        <button type="button" onclick="loadMarkdownDir()">Markdownを読み込む</button>
        <button type="button" onclick="saveStore()">VectorStoreを保存する</button>
        <div id="storeStatus" class="store-status"></div>
    </div>

    <div class="controls">
        <label>
            検索対象:
            <select id="mode">
                <option value="dir">docs全体</option>
                <option value="file">ファイル指定</option>
            </select>
        </label>

        <label id="fileNameLabel">
            fileName:
            <select id="fileName">
                <option value="spring-ai-tools.md">spring-ai-tools.md</option>
                <option value="spring-ai-rag.md">spring-ai-rag.md</option>
                <option value="spring-ai-notes.md">spring-ai-notes.md</option>
            </select>
        </label>

        <label>
            topK:
            <input id="topK" type="number" value="10" min="1" max="20">
        </label>

        <label>
            threshold:
            <input id="threshold" type="number" value="0.0" min="0" max="1" step="0.05">
        </label>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <textarea id="message" placeholder="質問を入力してください">ToolContextとは何ですか？</textarea>
    <br>
    <button id="sendButton" onclick="sendMessage()">送信</button>
    <button type="button" onclick="clearChat()">履歴クリア</button>

    <script>
        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const sendButton = document.getElementById("sendButton");
            const mode = document.getElementById("mode").value;
            const fileName = document.getElementById("fileName").value;
            const topK = document.getElementById("topK").value;

            const message = messageInput.value.trim();
            const threshold = document.getElementById("threshold").value;

            if (!message) {
                alert("質問を入力してください。");
                return;
            }

            sendButton.disabled = true;
            sendButton.textContent = "送信中...";

            appendMessage("user", message);

            const loadingElement = appendMessage("assistant loading", "回答生成中...");
            const startTime = performance.now();
            try {
                let url;
                let body;

                if (mode === "file") {
                    url = "/ai/rag/ask-md-file";
                    body = {
                        fileName: fileName,
                        message: message,
                        topK: Number(topK),
                        threshold: Number(threshold)
                    };
                } else {
                    url = "/ai/rag/ask-md-dir";
                    body = {
                        message: message,
                        topK: Number(topK),
                        threshold: Number(threshold)
                    };
                }

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const data = await response.json();

                loadingElement.remove();
                const elapsedSeconds = ((performance.now() - startTime) / 1000).toFixed(2);
                appendAnswer(data, elapsedSeconds);

            } catch (error) {
                loadingElement.textContent = "エラーが発生しました: " + error.message;

            } finally {
                sendButton.disabled = false;
                sendButton.textContent = "送信";
            }
        }

        function appendMessage(type, text) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message " + type;
            div.textContent = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            return div;
        }

        function appendAnswer(data, elapsedSeconds) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message assistant";

            const answer = document.createElement("div");
            answer.textContent = data.answer;
            div.appendChild(answer);

            const meta = document.createElement("div");
            meta.className = "answer-meta";
            meta.textContent = `回答時間: ${elapsedSeconds} 秒`;
            div.appendChild(meta);

            if (data.sources && data.sources.length > 0) {
                const sources = document.createElement("div");
                sources.className = "sources";

                const title = document.createElement("strong");
                title.textContent = "参照元";
                sources.appendChild(title);

                data.sources.forEach(source => {
                    const item = document.createElement("div");
                    item.className = "source-item";

                    const summary = document.createElement("div");
                    summary.textContent =
                        `fileName: ${source.fileName || ""}\n` +
                        `title: ${source.title || ""}\n` +
                        `score: ${source.score}\n` +
                        `distance: ${source.distance}`;

                    const details = document.createElement("details");
                    const detailsSummary = document.createElement("summary");
                    detailsSummary.textContent = "本文を表示";

                    const pre = document.createElement("pre");
                    pre.textContent = source.text || "";
                    pre.style.whiteSpace = "pre-wrap";

                    details.appendChild(detailsSummary);
                    details.appendChild(pre);

                    item.appendChild(summary);
                    item.appendChild(details);

                    sources.appendChild(item);
                });

                div.appendChild(sources);
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("message").addEventListener("keydown", function (event) {
            if (event.ctrlKey && event.key === "Enter") {
                sendMessage();
            }
        });

        async function callStoreEndpoint(path) {
            const status = document.getElementById("storeStatus");
            status.textContent = "実行中...";

            try {
                const response = await fetch(path);

                if (!response.ok) {
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const text = await response.text();
                status.textContent = text;

            } catch (error) {
                status.textContent = "エラーが発生しました: " + error.message;
            }
        }

        function loadStore() {
            callStoreEndpoint("/ai/rag/load-store");
        }

        function loadMarkdownDir() {
            if (!confirm("MarkdownをVectorStoreに追加します。既に読み込み済みの場合は重複する可能性があります。実行しますか？")) {
                return;
            }

            callStoreEndpoint("/ai/rag/load-md-dir");
        }

        function saveStore() {
            callStoreEndpoint("/ai/rag/save-store");
        }

        function clearChat() {
            const chatBox = document.getElementById("chatBox");
            chatBox.innerHTML = "";
        }

        function updateFileNameControl() {
            const mode = document.getElementById("mode").value;
            const fileName = document.getElementById("fileName");
            const fileNameLabel = document.getElementById("fileNameLabel");

            if (mode === "file") {
                fileName.disabled = false;
                fileNameLabel.style.opacity = "1.0";
            } else {
                fileName.disabled = true;
                fileNameLabel.style.opacity = "0.5";
            }
        }

        document.getElementById("mode").addEventListener("change", updateFileNameControl);
        updateFileNameControl();
    </script>
</body>

</html>
