<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>就業規則・労務管理 RAG チャット</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 16px;
            background: #f7f7f7;
        }

        .nav {
            text-align: right;
            margin-bottom: 8px;
            font-size: 14px;
        }

        h1 {
            font-size: 24px;
        }

        .doc-link {
            font-size: 13px;
            color: #555;
            margin-bottom: 16px;
        }

        .chat-box {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            min-height: 300px;
            margin-bottom: 16px;
        }

        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            white-space: pre-wrap;
        }

        .user {
            background: #e8f0ff;
        }

        .assistant {
            background: #f0f0f0;
        }

        .sources {
            margin-top: 12px;
            font-size: 13px;
            color: #555;
        }

        .source-item {
            border-left: 4px solid #ccc;
            padding-left: 8px;
            margin-top: 8px;
        }

        textarea {
            width: 100%;
            height: 80px;
            font-size: 16px;
            padding: 8px;
            box-sizing: border-box;
        }

        button {
            margin-top: 8px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        select,
        input {
            padding: 6px;
            margin-right: 8px;
        }

        .controls {
            margin-bottom: 12px;
        }

        .loading {
            color: #777;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        pre {
            background: #fafafa;
            border: 1px solid #ddd;
            padding: 8px;
            border-radius: 6px;
        }

        .store-panel {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 16px;
        }

        .store-panel button {
            margin-left: 8px;
            margin-top: 0;
            padding: 6px 12px;
            font-size: 14px;
        }

        .store-status {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
            white-space: pre-wrap;
        }

        .answer-meta {
            margin-top: 8px;
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>
    <div class="nav">
        <a href="/rag-chat.html">← Spring AI RAG Chat へ</a>
    </div>

    <h1>就業規則・労務管理 RAG チャット</h1>

    <div class="doc-link">
        使用文書: <a href="https://www.mhlw.go.jp/content/001620507.pdf" target="_blank">厚生労働省 就業規則モデル（令和6年版）</a>
    </div>

    <div class="store-panel">
        <strong>VectorStore操作</strong>
        <button type="button" id="loadPdfButton" onclick="loadPdf()">就業規則PDFを取り込む</button>
        <button type="button" onclick="callStoreEndpoint('/api/labor/load-store')">保存済みVectorStoreを読み込む</button>
        <button type="button" onclick="callStoreEndpoint('/api/labor/save-store')">VectorStoreを保存する</button>
        <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #eee;">
            <label style="font-size: 14px;"><strong>PDFアップロード</strong>（自社文書の追加）</label><br>
            <input type="file" id="pdfFile" accept=".pdf" style="margin-top: 6px; font-size: 13px;">
            <button type="button" id="uploadButton" onclick="uploadFile()"
                style="margin-left: 6px; padding: 5px 12px; font-size: 13px;">アップロードして取り込む</button>
        </div>
        <div id="storeStatus" class="store-status"></div>
    </div>

    <div class="controls">
        <label>
            topK:
            <input id="topK" type="number" value="5" min="1" max="20">
        </label>

        <label>
            threshold:
            <input id="threshold" type="number" value="0.0" min="0" max="1" step="0.05">
        </label>
    </div>

    <div style="margin-bottom: 8px; font-size: 13px; color: #555;">
        会話ID: <span id="conversationIdDisplay" style="font-family: monospace;"></span>
        <button type="button" onclick="newConversation()"
            style="margin-left: 12px; padding: 3px 10px; font-size: 12px;">新しい会話を始める</button>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <textarea id="message" placeholder="例: 年次有給休暇は何日取得できますか？"></textarea>
    <br>
    <button id="sendButton" onclick="sendMessage()">送信</button>
    <button type="button" onclick="searchOnly()">検索のみ</button>
    <button type="button" onclick="clearChat()">表示クリア</button>

    <script>
        let conversationId = crypto.randomUUID();

        function updateConversationDisplay() {
            document.getElementById("conversationIdDisplay").textContent =
                conversationId.substring(0, 8) + "...";
        }

        function newConversation() {
            conversationId = crypto.randomUUID();
            updateConversationDisplay();
            document.getElementById("chatBox").innerHTML = "";
        }

        updateConversationDisplay();

        async function sendMessage() {
            const messageInput = document.getElementById("message");
            const sendButton = document.getElementById("sendButton");
            const topK = document.getElementById("topK").value;
            const threshold = document.getElementById("threshold").value;
            const message = messageInput.value.trim();

            if (!message) {
                alert("質問を入力してください。");
                return;
            }

            sendButton.disabled = true;
            sendButton.textContent = "送信中...";

            appendMessage("user", message);

            const loadingElement = appendMessage("assistant loading", "回答生成中...");
            const startTime = performance.now();

            try {
                const response = await fetch("/api/labor/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: message,
                        topK: Number(topK),
                        threshold: Number(threshold),
                        conversationId: conversationId
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    if (errorData && errorData.message) {
                        throw new Error(`${errorData.message} (${errorData.code || response.status})`);
                    }
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const data = await response.json();
                loadingElement.remove();
                const elapsedSeconds = ((performance.now() - startTime) / 1000).toFixed(2);
                appendAnswer(data, elapsedSeconds);

            } catch (error) {
                loadingElement.textContent = "エラーが発生しました: " + error.message;
            } finally {
                sendButton.disabled = false;
                sendButton.textContent = "送信";
            }
        }

        function appendMessage(type, text) {
            const chatBox = document.getElementById("chatBox");
            const div = document.createElement("div");
            div.className = "message " + type;
            div.textContent = text;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return div;
        }

        function appendAnswer(data, elapsedSeconds) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message assistant";

            const answer = document.createElement("div");
            answer.textContent = data.answer;
            div.appendChild(answer);

            const meta = document.createElement("div");
            meta.className = "answer-meta";
            meta.textContent = `回答時間: ${elapsedSeconds} 秒`;
            div.appendChild(meta);

            if (data.sources && data.sources.length > 0) {
                const sources = document.createElement("div");
                sources.className = "sources";

                const title = document.createElement("strong");
                title.textContent = "参照元";
                sources.appendChild(title);

                data.sources.forEach(source => {
                    const item = document.createElement("div");
                    item.className = "source-item";

                    const summary = document.createElement("div");
                    summary.textContent =
                        `fileName: ${source.fileName || ""}\n` +
                        `title: ${source.title || ""}\n` +
                        `score: ${source.score}\n` +
                        `distance: ${source.distance}`;

                    const details = document.createElement("details");
                    const detailsSummary = document.createElement("summary");
                    detailsSummary.textContent = "本文を表示";

                    const pre = document.createElement("pre");
                    pre.textContent = source.text || "";
                    pre.style.whiteSpace = "pre-wrap";

                    details.appendChild(detailsSummary);
                    details.appendChild(pre);

                    item.appendChild(summary);
                    item.appendChild(details);
                    sources.appendChild(item);
                });

                div.appendChild(sources);
            }

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById("message").addEventListener("keydown", function (event) {
            if (event.ctrlKey && event.key === "Enter") {
                sendMessage();
            }
        });

        async function loadPdf() {
            const btn = document.getElementById("loadPdfButton");
            const status = document.getElementById("storeStatus");

            if (!confirm("厚生労働省の就業規則モデルPDFをダウンロードしてVectorStoreに取り込みます。\n処理に数分かかる場合があります。実行しますか？")) {
                return;
            }

            btn.disabled = true;
            btn.textContent = "取り込み中...";
            status.textContent = "PDFをダウンロード・解析中です。しばらくお待ちください...";

            try {
                const response = await fetch("/api/labor/load", { method: "POST" });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    if (errorData && errorData.message) {
                        throw new Error(`${errorData.message} (${errorData.code || response.status})`);
                    }
                    throw new Error(`HTTP error: ${response.status}`);
                }
                const text = await response.text();
                status.textContent = text;
            } catch (error) {
                status.textContent = "エラーが発生しました: " + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = "就業規則PDFを取り込む";
            }
        }

        async function callStoreEndpoint(path) {
            const status = document.getElementById("storeStatus");
            status.textContent = "実行中...";

            try {
                const response = await fetch(path);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    if (errorData && errorData.message) {
                        throw new Error(`${errorData.message} (${errorData.code || response.status})`);
                    }
                    throw new Error(`HTTP error: ${response.status}`);
                }
                const text = await response.text();
                status.textContent = text;
            } catch (error) {
                status.textContent = "エラーが発生しました: " + error.message;
            }
        }

        async function searchOnly() {
            const topK = document.getElementById("topK").value;
            const threshold = document.getElementById("threshold").value;
            const message = document.getElementById("message").value.trim();

            if (!message) {
                alert("質問を入力してください。");
                return;
            }

            appendMessage("user", "[検索のみ] " + message);
            const loadingElement = appendMessage("assistant loading", "検索中...");

            try {
                const url = `/api/labor/search?message=${encodeURIComponent(message)}&topK=${encodeURIComponent(topK)}&threshold=${encodeURIComponent(threshold)}`;
                const response = await fetch(url);

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    if (errorData && errorData.message) {
                        throw new Error(`${errorData.message} (${errorData.code || response.status})`);
                    }
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const sources = await response.json();
                loadingElement.remove();
                appendSearchResults(sources);

            } catch (error) {
                loadingElement.textContent = "エラーが発生しました: " + error.message;
            }
        }

        function appendSearchResults(sources) {
            const chatBox = document.getElementById("chatBox");

            const div = document.createElement("div");
            div.className = "message assistant";

            const title = document.createElement("div");
            title.textContent = `検索結果: ${sources.length} 件`;
            div.appendChild(title);

            if (sources.length === 0) {
                const empty = document.createElement("div");
                empty.textContent = "該当する文書はありません。";
                div.appendChild(empty);
            }

            sources.forEach(source => {
                const item = document.createElement("div");
                item.className = "source-item";

                const summary = document.createElement("div");
                summary.textContent =
                    `fileName: ${source.fileName || ""}\n` +
                    `title: ${source.title || ""}\n` +
                    `score: ${source.score}\n` +
                    `distance: ${source.distance}`;

                const details = document.createElement("details");
                const detailsSummary = document.createElement("summary");
                detailsSummary.textContent = "本文を表示";

                const pre = document.createElement("pre");
                pre.textContent = source.text || "";
                pre.style.whiteSpace = "pre-wrap";

                details.appendChild(detailsSummary);
                details.appendChild(pre);

                item.appendChild(summary);
                item.appendChild(details);
                div.appendChild(item);
            });

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function clearChat() {
            document.getElementById("chatBox").innerHTML = "";
        }

        async function uploadFile() {
            const fileInput = document.getElementById("pdfFile");
            const btn = document.getElementById("uploadButton");
            const status = document.getElementById("storeStatus");

            if (!fileInput.files || fileInput.files.length === 0) {
                alert("PDFファイルを選択してください。");
                return;
            }

            const file = fileInput.files[0];
            btn.disabled = true;
            btn.textContent = "取り込み中...";
            status.textContent = `${file.name} を解析・埋め込み中です。しばらくお待ちください...`;

            const formData = new FormData();
            formData.append("file", file);

            try {
                const response = await fetch("/api/labor/upload", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => null);
                    if (errorData && errorData.message) {
                        throw new Error(`${errorData.message} (${errorData.code || response.status})`);
                    }
                    throw new Error(`HTTP error: ${response.status}`);
                }

                const text = await response.text();
                status.textContent = text;
                fileInput.value = "";
            } catch (error) {
                status.textContent = "エラーが発生しました: " + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = "アップロードして取り込む";
            }
        }
    </script>
</body>

</html>
